      <rect width="120" height="36" rx="18" fill="#fff" stroke="#dde1e9" stroke-width="1"/>
      <circle cx="20" cy="18" r="3.5" fill="#71a22f"/>
      <text x="34" y="23" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#323848">FEFO POS</text>
    </g>
    <g transform="translate(292,0)">
      <rect width="140" height="36" rx="18" fill="#fff" stroke="#dde1e9" stroke-width="1"/>
      <circle cx="20" cy="18" r="3.5" fill="#71a22f"/>
      <text x="34" y="23" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#323848">Audit trails</text>
    </g>
    <g transform="translate(444,0)">
      <rect width="160" height="36" rx="18" fill="#fff" stroke="#dde1e9" stroke-width="1"/>
      <circle cx="20" cy="18" r="3.5" fill="#71a22f"/>
      <text x="34" y="23" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#323848">Self-hostable</text>
